name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build Strands.sln --configuration Release

      - name: Test
        run: dotnet test Strands.sln --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack Strands.sln --configuration Release --output ./artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
