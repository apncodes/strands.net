name: AOT Lambda — Build, Deploy, Benchmark

on:
  workflow_dispatch:
    inputs:
      lambda_role_arn:
        description: 'Lambda execution role ARN (must have bedrock:InvokeModel)'
        required: true
        default: 'arn:aws:iam::942466928268:role/strands-aot-demo-role'
      aws_region:
        description: 'AWS region'
        required: true
        default: 'us-east-1'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install native build dependencies
        run: sudo apt-get install -y clang zlib1g-dev

      - name: Publish NativeAOT
        run: |
          dotnet publish samples/AotLambda/AotLambda.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --output samples/AotLambda/publish
        working-directory: strands.net

      - name: Package for Lambda
        run: |
          cp samples/AotLambda/publish/AotLambda bootstrap
          zip -j function.zip bootstrap
        working-directory: strands.net

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Deploy to Lambda
        run: |
          FUNCTION_NAME="strands-aot-demo"
          ROLE_ARN="${{ inputs.lambda_role_arn }}"
          REGION="${{ inputs.aws_region }}"

          # Create or update
          if aws lambda get-function --function-name $FUNCTION_NAME --region $REGION 2>/dev/null; then
            echo "Updating existing function..."
            aws lambda update-function-code \
              --function-name $FUNCTION_NAME \
              --zip-file fileb://function.zip \
              --region $REGION
            aws lambda wait function-updated --function-name $FUNCTION_NAME --region $REGION
          else
            echo "Creating new function..."
            aws lambda create-function \
              --function-name $FUNCTION_NAME \
              --runtime provided.al2023 \
              --handler bootstrap \
              --role $ROLE_ARN \
              --zip-file fileb://function.zip \
              --memory-size 512 \
              --timeout 30 \
              --environment "Variables={AWS_REGION=$REGION}" \
              --region $REGION
            aws lambda wait function-active --function-name $FUNCTION_NAME --region $REGION
          fi
        working-directory: strands.net

      - name: Run cold-start benchmarks (10 invocations)
        run: |
          FUNCTION_NAME="strands-aot-demo"
          REGION="${{ inputs.aws_region }}"

          echo "## AOT Cold-Start Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Run | Init Duration (ms) | Duration (ms) |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          INIT_TOTAL=0
          INIT_MIN=99999
          INIT_MAX=0
          COUNT=0

          for i in $(seq 1 10); do
            # Force cold start by updating description
            aws lambda update-function-configuration \
              --function-name $FUNCTION_NAME \
              --description "benchmark-run-$i-$(date +%s)" \
              --region $REGION > /dev/null
            aws lambda wait function-updated --function-name $FUNCTION_NAME --region $REGION

            # Invoke and capture logs
            RESULT=$(aws lambda invoke \
              --function-name $FUNCTION_NAME \
              --payload '"What is the weather in London?"' \
              --cli-binary-format raw-in-base64-out \
              --log-type Tail \
              --region $REGION \
              /tmp/response.json 2>&1)

            LOG=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); import base64; print(base64.b64decode(d['LogResult']).decode())" 2>/dev/null)

            INIT=$(echo "$LOG" | grep -oP 'Init Duration: \K[\d.]+' || echo "0")
            DUR=$(echo "$LOG" | grep -oP 'Duration: \K[\d.]+' | head -1 || echo "0")

            echo "| $i | $INIT | $DUR |" >> $GITHUB_STEP_SUMMARY

            if [ "$INIT" != "0" ]; then
              INIT_INT=$(echo "$INIT" | cut -d. -f1)
              INIT_TOTAL=$((INIT_TOTAL + INIT_INT))
              COUNT=$((COUNT + 1))
              [ $INIT_INT -lt $INIT_MIN ] && INIT_MIN=$INIT_INT
              [ $INIT_INT -gt $INIT_MAX ] && INIT_MAX=$INIT_INT
            fi

            sleep 2
          done

          if [ $COUNT -gt 0 ]; then
            INIT_AVG=$((INIT_TOTAL / COUNT))
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Summary:** avg=${INIT_AVG}ms, min=${INIT_MIN}ms, max=${INIT_MAX}ms (${COUNT} cold starts)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "INIT_AVG=$INIT_AVG" >> $GITHUB_ENV
            echo "INIT_MIN=$INIT_MIN" >> $GITHUB_ENV
            echo "INIT_MAX=$INIT_MAX" >> $GITHUB_ENV
          fi

      - name: Print benchmark summary
        run: |
          echo "Cold-start results: avg=${INIT_AVG}ms, min=${INIT_MIN}ms, max=${INIT_MAX}ms"
